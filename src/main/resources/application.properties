spring.application.name=MusicLabelV2
server.port=8090

# ============================================
# БАЗА ДАННЫХ
# ============================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.url=jdbc:postgresql://localhost:5432/musiclabelv2

# HikariCP (из твоего DataSourceProvider)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# FREEMARKER
# ============================================
spring.freemarker.enabled=true
spring.freemarker.suffix=.ftlh
spring.freemarker.content-type=text/html
spring.freemarker.charset=UTF-8
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.expose-request-attributes=false
spring.freemarker.expose-session-attributes=false
spring.freemarker.expose-spring-macro-helpers=true
spring.freemarker.settings.template_exception_handler=HTML_DEBUG
spring.freemarker.settings.boolean_format=c
spring.freemarker.settings.number_format=computer
spring.freemarker.settings.fallback_on_null_loop_variable=false

# ============================================
# СТАТИЧЕСКИЕ РЕСУРСЫ (CSS, JS, картинки)
# ============================================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ============================================
# ЗАГРУЗКА ФАЙЛОВ (для FileStorage)
# ============================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ============================================
# ЗАГРУЗКА ФАЙЛОВ (дополняем)
# ============================================
app.upload.max-file-size=10485760
app.upload.allowed-audio-types=audio/mpeg,audio/wav,audio/mp3
app.upload.audio-path=uploads/audio
app.upload.image-path=uploads/images
# ============================================
# БИЗНЕС-ПРАВИЛА
# ============================================
app.business.max-submissions-per-artist=20
app.business.max-services-per-label=10

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
